services:
  - type: web
    name: skynet-tax-engine
    runtime: python
    version: 3.11
    buildCommand: poetry install --no-root
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /health
