[build]
  command = "pip install -e . && python -c 'from app.un_jurisdictions import get_un_jurisdiction_db; get_un_jurisdiction_db()'"
  publish = "app/static"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"

[dev]
  command = "uvicorn app.main:app --reload --port 8000"
  targetPort = 8000
  publish = "app/static"
